<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard | Ber Can’t Fitness</title>
<link rel="stylesheet" href="style.css">
<script type="module" src="app.js"></script>
</head>
<meta name="description" content="Bercant resmi web sitesi.">
<meta name="keywords" content="Bercant, bercant">
<body>

<div class="admin-layout">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>👑 Admin</h2>
    <a href="#" onclick="loadDashboard()">📊 Dashboard</a>
    <a href="#" onclick="loadAllData()">📋 Tüm Kayıtlar</a>
    <a href="#" onclick="logout()">🚪 Çıkış</a>
  </div>

  <!-- MAIN -->
  <div class="main-content">

    <h1>Ber Can’t Fitness Panel</h1>

    <!-- STATS -->
    <div class="stats">
      <div class="stat-box">
        <h3 id="totalRecords">0</h3>
        <p>Toplam Kayıt</p>
      </div>

      <div class="stat-box">
        <h3 id="totalUsers">0</h3>
        <p>Toplam Sporcu</p>
      </div>
    </div>

    <!-- RECORD LIST -->
    <div id="allRecords"></div>

  </div>

</div>

<script>
const ADMIN_PASSWORD = "1234"; // değiştir

if (localStorage.getItem("adminAuth") !== "true") {
  const pass = prompt("Admin Şifresi:");
  if (pass === ADMIN_PASSWORD) {
    localStorage.setItem("adminAuth", "true");
  } else {
    alert("Yetkisiz erişim");
    window.location.href = "index.html";
  }
}

function logout(){
  localStorage.removeItem("adminAuth");
  window.location.href = "index.html";
}
</script>

</body>
</html>
