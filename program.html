<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Programlar</title>
<link rel="stylesheet" href="style.css">

<style>
.program-modal{
  display:none;
  position:fixed;
  z-index:3000;
  left:0;
  top:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.92);
  overflow:auto;
}

.program-content{
  background:#111;
  margin:3% auto;
  padding:40px;
  width:95%;
  max-width:1100px;
  border-radius:20px;
  color:#ccc;
  line-height:1.9;
}

.program-content h2,
.program-content h3{
  color:#00e676;
}

.close-program{
  float:right;
  font-size:30px;
  cursor:pointer;
  color:#00e676;
}

.close-program:hover{
  color:white;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  margin-top:30px;
}

.card{
  background:#1a1a1a;
  padding:30px;
  border-radius:15px;
  text-align:center;
  cursor:pointer;
  transition:0.3s;
  font-weight:bold;
}

.card:hover{
  background:#00e676;
  color:black;
}

.insta-btn{
  display:inline-block;
  margin-top:25px;
  padding:14px 30px;
  border-radius:30px;
  font-weight:bold;
  text-decoration:none;
  color:white;
  background:linear-gradient(45deg,#feda75,#fa7e1e,#d62976,#962fbf,#4f5bd5);
  transition:0.3s;
}

.insta-btn:hover{
  transform:scale(1.05);
}

.day{
  margin-top:25px;
}
</style>
</head>

<body>

<div class="navbar">
  <a href="index.html" class="logo">💪 Ber can’t ⚡</a>
</div>

<section>
<h2 style="text-align:center;">Programlar</h2>

<div class="grid">
  <div class="card" onclick="openModal('baslangic')">Başlangıç Programı</div>
  <div class="card" onclick="openModal('yag')">🔥 Yağ Yakımı</div>
  <div class="card" onclick="openModal('kas')">💪 Kas Geliştirme</div>
  <div class="card" onclick="openModal('kocluk')">👤 Kişisel Koçluk</div>
</div>
</section>

<div id="programModal" class="program-modal">
  <div class="program-content">
    <span class="close-program" onclick="closeModal()">&times;</span>
    <div id="programBody"></div>
  </div>
</div>

<script>

function openModal(type){
const body = document.getElementById("programBody");

if(type === "baslangic"){
body.innerHTML = `
<h2>🏋️ Başlangıç Programı</h2>
<strong>Haftada 4-5 Gün</strong><br><br>

Lat pulldown — 3x12<br>
Seated low row — 3x12<br>
Machine shoulder press — 3x12<br>
Chest press — 3x12<br>
Machine fly — 3x12<br>
Cable biceps curl — 3x12<br>
Cable triceps pushdown — 3x12<br>
Leg extension — 3x12<br>
Leg curl — 3x12<br>
Hanging leg raise — 4 set tükenişe kadar<br><br>

🔥 30-45 dk kardiyo<br>
Incline: 15 | Speed: 5
`;
}

if(type === "yag"){
body.innerHTML = `
<h2>🔥 YAĞ YAKIMI PROGRAMI (Orta Seviye)</h2>

👉 12-15 tekrar<br>
👉 30-45 sn dinlenme<br>
👉 Süpersetlerde dinlenme yok<br>

<div class="day">
<h3>🟢 Pazartesi – Sırt + Arka Kol</h3>
Lat pulldown — 4x12<br>
SUPERSET Rope pushdown — 4x15<br>
Dumbbell row — 3x12<br>
SUPERSET Close grip pushdown — 3x15<br>
Straight arm pulldown — 3x15<br>
🔥 10 dk incline yürüyüş
</div>

<div class="day">
<h3>🟢 Salı – Omuz + Ön Kol</h3>
Shoulder press — 4x12<br>
SUPERSET Lateral raise + Front raise — 3x15<br>
SUPERSET Rear delt machine + Barbell curl — 3x12<br>
Preacher curl — 3x12<br>
🔥 8 dk HIIT
</div>

<div class="day">
<h3>🟢 Çarşamba – Aktif Dinlenme</h3>
25-30 dk yürüyüş veya hafif cardio + core
</div>

<div class="day">
<h3>🟢 Perşembe – Bacak</h3>
Hack squat — 4x12<br>
SUPERSET Leg extension + Leg curl — 3x15<br>
Walking lunge — 3 tur<br>
SUPERSET Leg press + Calf raise — 3x15<br>
🔥 10 dk bisiklet sprint
</div>

<div class="day">
<h3>🟢 Cuma – Göğüs</h3>
Incline bench press — 4x12<br>
SUPERSET Incline fly + Butterfly — 3x15<br>
Bench press — 3x10<br>
🔥 Battle rope 8 dk
</div>

<div class="day">
<h3>🟢 Cumartesi – Kol + Metabolik</h3>
SUPERSET Barbell curl + Skullcrusher — 4x12<br>
SUPERSET Hammer curl + Rope pushdown — 3x15<br><br>
🔥 3 tur:<br>
Jump squat x15<br>
Mountain climber 30 sn<br>
Burpee x10
</div>

<h3>⚡ Yağ Yakım İpuçları</h3>
Antrenman sonrası 15 dk yürüyüş<br>
Protein yüksek tut<br>
Kalori açığı oluştur ama aşırı düşürme
`;
}

if(type === "kas"){
body.innerHTML = `
<h2>💪 KAS GELİŞTİRME PROGRAMI</h2>

<h3>🟦 Pazartesi (Göğüs + Omuz + Triceps)</h3>
Plate Loaded Chest Press — 2×5–6 (RIR 1)<br>
Smith Machine Low Incline Press — 2×5–6 (RIR 1)<br>
Chest Fly Machine — 1×6–8 (Failure)<br>
Shoulder Press Machine — 2×5–6 (RIR 1)<br>
Lateral Raise — 3×8–10 (Failure)<br>
Triceps Pushdown — 2×6–8 (Failure)<br>
Overhead Rope Extension — 2×8–10 (Failure)<br><br>

<h3>🟦 Salı (Sırt + Biceps)</h3>
Lat Pulldown — 2×6–8 (RIR 1 – Failure)<br>
Plate Loaded Wide Grip Row — 3×6–8 (RIR 1 – Failure)<br>
Cable Row — 1×8–10 (Failure)<br>
Dumbbell Curl — 2×6–8 (Failure)<br>
Cable Curl — 2×6–8 (Failure)<br>
Hammer Curl + Reverse Barbell Curl — 2×8–10 (Failure – Süperset)<br><br>

<h3>🟦 Çarşamba (Bacak)</h3>
Leg Press — 2×6–8 (RIR 1)<br>
Smith Machine Squat — 2×6–8 (RIR 1)<br>
Leg Extension — 2×8–10 (Failure)<br>
Seated Leg Curl — 3×8–10 (RIR 1)<br><br>

<h3>🟦 Cuma (Göğüs + Omuz + Triceps)</h3>
Shoulder Press Machine — 2×5–6 (RIR 1)<br>
Lateral Raise — 3×8–10 (Failure)<br>
Smith Machine Low Incline Press — 2×5–6 (RIR 1)<br>
Chest Fly Machine — 2×6–8 (Failure)<br>
Cable Rear Delt Fly — 2×8–10 (Failure)<br>
Triceps Pushdown — 2×6–8 (Failure)<br>
Overhead Rope Extension — 2×8–10 (Failure)<br><br>

<h3>🟦 Cumartesi (Sırt + Biceps + Bacak)</h3>
Plate Loaded Wide Grip Row — 3×6–8 (RIR 1 – Failure)<br>
Close Grip Lat Pulldown — 3×6–8 (RIR 1 – Failure)<br>
Cable Curl — 2×6–8 (Failure)<br>
Hammer Curl + Reverse Barbell Curl — 2×8–10 (Failure – Süperset)<br>
Leg Press — 2×6–8 (RIR 1)<br>
Leg Extension — 2×6–8 (Failure)<br>
Seated Leg Curl — 1×8–10 (Failure)<br><br>

<h3>🔹 RIR Açıklaması</h3>
RIR 3 → 3 tekrar kalmış<br>
RIR 2 → 2 tekrar kalmış<br>
RIR 1 → 1 tekrar kalmış<br>
RIR 0 → Failure (tükeniş)<br><br>

<h3>🔹 Ek Bilgi (Haftada 2 Antrenman Sonu)</h3>
3×10 Cable Crunch<br>
3×10 Standing Calf Raise
`;
}

if(type === "kocluk"){
body.innerHTML = `
<h2>👤 Kişisel Koçluk</h2>
Birebir online koçluk sistemi<br>
Beslenme planı + Haftalık kontrol + Program güncelleme<br><br>

<a class="insta-btn" href="https://www.instagram.com/bybercant/" target="_blank">
Instagram'dan Ulaş
</a>
`;
}

document.getElementById("programModal").style.display="block";
}

function closeModal(){
document.getElementById("programModal").style.display="none";
}

window.onclick = function(e){
if(e.target == document.getElementById("programModal")){
closeModal();
}
}

</script>

</body>
</html>
