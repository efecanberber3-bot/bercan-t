<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Programlar</title>
<link rel="stylesheet" href="style.css">

<style>

.program-modal{
  display:none;
  position:fixed;
  z-index:3000;
  left:0;
  top:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.9);
  overflow:auto;
}

.program-content{
  background:#111;
  margin:3% auto;
  padding:35px;
  width:95%;
  max-width:1100px;
  border-radius:20px;
  color:#ccc;
  line-height:1.8;
}

.program-content h2,
.program-content h3{
  color:#00e676;
}

.close-program{
  float:right;
  font-size:30px;
  cursor:pointer;
  color:#00e676;
}

.close-program:hover{
  color:white;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  margin-top:30px;
}

.card{
  background:#1a1a1a;
  padding:30px;
  border-radius:15px;
  text-align:center;
  cursor:pointer;
  transition:0.3s;
  font-weight:bold;
}

.card:hover{
  background:#00e676;
  color:black;
}

/* Instagram Buton */
.insta-btn{
  display:inline-block;
  margin-top:20px;
  padding:12px 25px;
  border-radius:30px;
  font-weight:bold;
  text-decoration:none;
  color:white;
  background:linear-gradient(
    45deg,
    #feda75,
    #fa7e1e,
    #d62976,
    #962fbf,
    #4f5bd5
  );
  transition:0.3s;
}

.insta-btn:hover{
  transform:scale(1.05);
}

</style>
</head>
<body>

<div class="navbar">
  <a href="index.html" class="logo">💪 Ber can’t ⚡</a>
</div>

<section>
<h2 style="text-align:center;">Programlar</h2>

<div class="grid">
<div class="card" onclick="openModal('baslangic')">Başlangıç Programı</div>
<div class="card" onclick="openModal('yag')">🔥 Yağ Yakımı</div>
<div class="card" onclick="openModal('kas')">Kas Geliştirme</div>
<div class="card" onclick="openModal('kocluk')">👤 Kişisel Koçluk</div>
</div>
</section>

<!-- MODAL -->
<div id="programModal" class="program-modal">
<div class="program-content">
<span class="close-program" onclick="closeModal()">&times;</span>
<div id="programBody"></div>
</div>
</div>

<script>

function openModal(type){
const body = document.getElementById("programBody");

if(type === "baslangic"){
body.innerHTML = `
<h2>🏋️ Başlangıç Programı</h2>
Haftada 4-5 Gün<br><br>

Lat pulldown — 3x12<br>
Seated low row — 3x12<br>
Machine shoulder press — 3x12<br>
Chest press — 3x12<br>
Machine fly — 3x12<br>
Cable biceps curl — 3x12<br>
Cable triceps pushdown — 3x12<br>
Leg extension — 3x12<br>
Leg curl — 3x12<br>
Hanging leg raise — 4 set tükeniş<br><br>

🔥 30-45 dk kardiyo (Incline 15 / Speed 5)
`;
}

if(type === "yag"){
body.innerHTML = `
<h2>🔥 Yağ Yakımı Programı</h2>
12-15 tekrar | 30-45 sn dinlenme<br><br>

Pazartesi – Sırt + Arka Kol<br>
Salı – Omuz + Ön Kol<br>
Perşembe – Bacak<br>
Cuma – Göğüs<br><br>

Yağ yakımı için protein yüksek tut ve kalori açığı oluştur.
`;
}

if(type === "kas"){
body.innerHTML = `
<h2>💪 Kas Geliştirme Programı</h2>

Pazartesi: Göğüs + Omuz + Triceps<br>
Salı: Sırt + Biceps<br>
Çarşamba: Bacak<br>
Cuma: Göğüs + Omuz + Triceps<br>
Cumartesi: Sırt + Biceps + Bacak<br><br>

RIR Sistemi uygulanır.<br>
RIR 1 = 1 tekrar kalmış<br>
RIR 0 = Failure
`;
}

if(type === "kocluk"){
body.innerHTML = `
<h2>👤 Kişisel Koçluk</h2>

Size özel birebir online koçluk sistemi.<br>
• Beslenme planı<br>
• Haftalık program güncelleme<br>
• Performans takibi<br>
• WhatsApp destek<br><br>

Aşağıdan Instagram üzerinden iletişime geçebilirsiniz 👇<br>

<a class="insta-btn" href="https://www.instagram.com/bybercant/" target="_blank">
Instagram'dan Ulaş
</a>
`;
}

document.getElementById("programModal").style.display="block";
}

function closeModal(){
document.getElementById("programModal").style.display="none";
}

window.onclick = function(e){
const modal = document.getElementById("programModal");
if(e.target == modal){
modal.style.display="none";
}
}

</script>

</body>
</html>
